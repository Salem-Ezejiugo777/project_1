<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | [Student Name]</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="logo">[Student Name]</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="mainNav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Me</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="planner.html">Academic Planner</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-main container">
    <h1>Contact Me</h1>
    <p class="page-intro">Have a question or want to collaborate? Fill out the form below.</p>

    <section class="contact-section">
      <form id="contactForm" class="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" />
          <span class="error-message" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="text" id="email" name="email" />
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" />
          <span class="error-message" id="phoneError"></span>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5"></textarea>
          <span class="error-message" id="messageError"></span>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
        <p id="formSuccess" class="form-success" role="status"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 [Student Name]. MIVA Open University — COS 106 Term Project.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
